    - name: EIA today in energy
      url: https://www.eia.gov/rss/todayinenergy.xml
      type: rss

dbnomics:
  name: DBnomics
  provider: DBnomics (aggregator)
  url: https://db.nomics.world
  api_base: https://db.nomics.world/api/v22
