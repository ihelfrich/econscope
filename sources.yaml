# ============================================================================
# ECONSCOPE — Source Registry
# ============================================================================
# This file is the single source of truth for all data sources, their rate
# limits, API details, and RSS/feed endpoints. To add a new source:
#
#   1. Add an entry below under the appropriate category
#   2. Create an adapter in econscope/adapters/<source_id>.py
#   3. Add the API key (if needed) to .env.example and .env
#   4. Run: econscope verify-keys
#
# The catalog builder reads this file to know what to index.
# The rate governor reads this file to enforce limits.
# ============================================================================

# ── MACRO / ECONOMIC ────────────────────────────────────────────────────────

fred:
  name: Federal Reserve Economic Data
  provider: Federal Reserve Bank of St. Louis
  url: https://fred.stlouisfed.org
  api_base: https://api.stlouisfed.org/fred
  key_env: FRED_API_KEY
  key_required: true
  rate_limit:
    requests_per_minute: 120
    daily_cap: null
  batch_size: 1
  series_count: 816000
  coverage: US macro, rates, prices, employment, housing, money, trade, regional
  frequency: [daily, weekly, monthly, quarterly, annual]
  geography: [US, state, metro, county, international]
  formats: [json, xml]
  docs: https://fred.stlouisfed.org/docs/api/fred/
  feeds:
    - name: FRED release calendar
      url: https://fred.stlouisfed.org/releases/calendar.rss
      type: rss

bls:
  name: Bureau of Labor Statistics
  provider: US Department of Labor
  url: https://www.bls.gov
  api_base: https://api.bls.gov/publicAPI/v2
  key_env: BLS_API_KEY
  key_required: false  # works without key, but rate-limited
  rate_limit:
    requests_per_day: 500  # with key; 25/day without
    batch_size: 50  # series per request
  coverage: CPI, PPI, employment, wages, JOLTS, productivity, consumer expenditure
  frequency: [monthly, quarterly, annual]
  geography: [US, state, metro]
  formats: [json]
  docs: https://www.bls.gov/developers/
  feeds:
    - name: BLS latest releases
      url: https://www.bls.gov/feed/bls_latest.rss
      type: rss
    - name: BLS economic news releases
      url: https://www.bls.gov/feed/bls_news.rss
      type: rss

bea:
  name: Bureau of Economic Analysis
  provider: US Department of Commerce
  url: https://www.bea.gov
  api_base: https://apps.bea.gov/api/data
  key_env: BEA_API_KEY
  key_required: true
  rate_limit:
    requests_per_minute: 100
    daily_cap: 1000
  coverage: GDP, personal income, PCE, IO tables, international trade in services, regional
  frequency: [monthly, quarterly, annual]
  geography: [US, state, metro, county]
  formats: [json, xml]
  docs: https://apps.bea.gov/api/_pdf/bea_web_service_api_user_guide.pdf
  feeds:
    - name: BEA news releases
      url: https://www.bea.gov/rss.xml
      type: rss

census:
  name: US Census Bureau
  provider: US Department of Commerce
  url: https://www.census.gov
  api_base: https://api.census.gov/data
  key_env: CENSUS_API_KEY
  key_required: false  # works without, but rate-limited
  rate_limit:
    requests_per_day: 500
    batch_size: 50  # variables per request
  coverage: ACS demographics, County Business Patterns, trade, population, housing
  frequency: [annual, decennial]
  geography: [US, state, county, tract, block_group, zip]
  formats: [json]
  docs: https://www.census.gov/data/developers/guidance.html

treasury:
  name: US Treasury Fiscal Data
  provider: US Department of the Treasury
  url: https://fiscaldata.treasury.gov
  api_base: https://api.fiscaldata.treasury.gov/services/api/fiscal_service
