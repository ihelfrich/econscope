  rate_limit:
    requests_per_second: 5  # self-imposed politeness
    batch_size: 100
  series_count: 78000000  # 78M+ series from 70+ providers
  coverage: aggregates FRED, ECB, Eurostat, OECD, IMF, World Bank, national stats offices, and 60+ more
  frequency: [all]
  geography: [global]
  formats: [json, csv]
  docs: https://db.nomics.world/docs/api/

