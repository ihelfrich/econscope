# ============================================================================
# RSS / ATOM FEEDS — Expert Opinions, Real-time Intelligence
# ============================================================================
# These are lightweight, high-signal feeds that pipe into the platform's
# news/opinion stream. No API key needed. Updated continuously.

feeds:

  # ── Central banks and government ────────────────────────────────────────

  - name: Federal Reserve Board speeches
    url: https://www.federalreserve.gov/feeds/speeches.xml
    type: rss
    category: central_bank
    tags: [fed, monetary_policy, speeches]

  - name: Federal Reserve press releases
    url: https://www.federalreserve.gov/feeds/press_all.xml
    type: rss
    category: central_bank
    tags: [fed, monetary_policy, fomc]

  - name: FOMC calendar
    url: https://www.federalreserve.gov/feeds/fomc_calendar.xml
    type: rss
    category: central_bank
    tags: [fed, fomc, calendar]

  - name: ECB press releases
    url: https://www.ecb.europa.eu/rss/press.html
    type: rss
    category: central_bank
    tags: [ecb, monetary_policy, europe]

  - name: Bank of England speeches
    url: https://www.bankofengland.co.uk/rss/speeches
    type: rss
    category: central_bank
    tags: [boe, monetary_policy, uk]

  - name: BIS research
    url: https://www.bis.org/doclist/bis_fsi_publs.rss
    type: rss
    category: central_bank
    tags: [bis, financial_stability, global]

  - name: US Treasury press releases
