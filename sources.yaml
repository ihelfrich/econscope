# ── FINANCIAL / CORPORATE ───────────────────────────────────────────────────

edgar:
  name: SEC EDGAR
  provider: US Securities and Exchange Commission
  url: https://www.sec.gov/edgar
  api_base: https://efts.sec.gov/LATEST
  key_required: false
