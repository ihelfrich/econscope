    requests_per_second: 10  # with proper User-Agent
  coverage: all SEC filings — 10-K, 10-Q, 8-K, S-1, DEF14A, 13D/13G, plus XBRL structured data
  formats: [json, html, xml, xbrl]
  docs: https://efts.sec.gov/LATEST/
  internal_tool: forensic-econ  # wraps this source
  feeds:
    - name: EDGAR full-text search RSS
      url: https://efts.sec.gov/LATEST/search-index?q={query}&dateRange=custom
      type: api  # not RSS, but real-time searchable
    - name: EDGAR company filings RSS
      url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK={cik}&type=&dateb=&owner=include&count=40&search_text=&action=getcompany&output=atom
      type: atom

